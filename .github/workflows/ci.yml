name: CI

on:
  push:
  pull_request:

jobs:
  ci:
    name: Lint, type-check, and test
    runs-on: ubuntu-latest

    env:
      HUSKY: "0"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Upgrade npm
        run: npm install -g npm@11

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npx tsc --noEmit

      - name: Test
        run: npm test
        env:
          TZ: UTC
